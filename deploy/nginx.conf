# ============================================================================
# OnPay — reference Nginx site config
# Path on the VPS: /etc/nginx/sites-available/onpay.id
# ============================================================================
#
# This file is the reference layout. The actual production config was
# generated by deploy/_certbot_webroot.py and includes both the HTTP->HTTPS
# redirect and the HTTPS server block already. Certbot issues the cert via
# webroot mode, not the --nginx plugin, because python3-certbot-nginx is
# not installed on this host (conflicts with WordOps's nginx-custom).
#
# DO NOT redeclare ssl_session_cache inside this file — WordOps declares it
# globally with a 50m shared zone and overriding it breaks nginx reload.

# HTTP — ACME challenge + redirect to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name onpay.id www.onpay.id;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — reverse proxy to the Node process.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name onpay.id www.onpay.id;

    ssl_certificate     /etc/letsencrypt/live/onpay.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/onpay.id/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/onpay.id.access.log;
    error_log  /var/log/nginx/onpay.id.error.log;

    # Buffer sizes tuned for the Solana Pay POST flow which carries a
    # base64-encoded VersionedTransaction (~2KB) in the response body.
    client_max_body_size 64k;

    # Reverse proxy to the PM2-managed Node process on 127.0.0.1:3456.
    # Next.js standalone binds to that port per ecosystem.config.cjs.
    location / {
        proxy_pass http://127.0.0.1:3456;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Don't let Nginx idle-close while Jupiter/Solana RPC calls are in
        # flight (worst case ~8s for the tx endpoint).
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Let static assets live longer in the browser cache. Next.js
    # fingerprints these so immutable is safe.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3456;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Gzip text assets.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Hide Nginx version from error pages / response headers.
    server_tokens off;
}
