# ============================================================================
# OnPay — Nginx site config
# Path: /etc/nginx/sites-available/onpay
# ============================================================================
#
# Certbot will automatically edit this file to add the HTTPS server block
# and the HTTP→HTTPS redirect when you run `certbot --nginx -d onpay.id`.
# Before Certbot runs, the server only listens on :80.

server {
    listen 80;
    listen [::]:80;
    server_name onpay.id www.onpay.id;

    # Certbot will insert its ACME challenge location here. Leave space.

    # Buffer sizes tuned for the Solana Pay POST flow which carries a
    # base64-encoded VersionedTransaction (~2KB) in the response body.
    client_max_body_size 64k;

    # Reverse proxy to the PM2-managed Node process on 127.0.0.1:3000.
    # Next.js standalone binds to that port per ecosystem.config.cjs.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Don't let Nginx idle-close while Jupiter/Solana RPC calls are in
        # flight (worst case ~8s for the tx endpoint).
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Let static assets live longer in the browser cache. Next.js
    # fingerprints these so immutable is safe.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Gzip text assets.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Hide Nginx version from error pages / response headers.
    server_tokens off;
}
