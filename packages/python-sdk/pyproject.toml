[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "onpay"
version = "0.1.0"
description = "Python SDK for the OnPay Solana payment gateway"
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
authors = [
    { name = "Holixora", email = "dev@holixora.com" },
]
keywords = ["solana", "payments", "crypto", "onpay"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.24",
]

[project.urls]
Homepage = "https://onpay.id"
Documentation = "https://docs.onpay.id"
Repository = "https://github.com/holixora/onpay-python"
